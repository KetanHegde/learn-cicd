name: CI-CD (GitHub Actions + CodeBuild + CodeDeploy)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3️⃣ Install AWS CLI v2
      - name: Install AWS CLI v2
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip awscliv2.zip
          sudo ./aws/install --update
          aws --version

      # 4️⃣ Start CodeBuild
      - name: Start CodeBuild
        id: start_build
        run: |
          BUILD_ID_FULL=$(aws codebuild start-build \
            --project-name simple-web-project \
            --query 'build.id' \
            --output text)

          echo "BUILD_ID_FULL=$BUILD_ID_FULL" >> $GITHUB_ENV
          echo "Started CodeBuild: $BUILD_ID_FULL"

      # 5️⃣ Wait for CodeBuild to complete
      - name: Wait for CodeBuild
        run: |
          while true; do
            STATUS=$(aws codebuild batch-get-builds \
              --ids $BUILD_ID_FULL \
              --query 'builds[0].buildStatus' \
              --output text)

            echo "Current build status: $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "✅ Build succeeded"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "FAULT" ] || [ "$STATUS" = "STOPPED" ]; then
              echo "❌ Build failed"
              exit 1
            else
              sleep 15
            fi
          done

      # 6️⃣ Get artifact location dynamically (BEST PRACTICE)
      - name: Get artifact location
        run: |
          ARTIFACT_ARN=$(aws codebuild batch-get-builds \
            --ids $BUILD_ID_FULL \
            --query 'builds[0].artifacts.location' \
            --output text)
      
          echo "Raw artifact location: $ARTIFACT_ARN"
      
          # Extract bucket
          BUCKET=$(echo $ARTIFACT_ARN | cut -d':' -f6 | cut -d'/' -f1)
      
          # Extract key
          KEY=$(echo $ARTIFACT_ARN | cut -d':' -f6 | cut -d'/' -f2-)
      
          echo "BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "KEY=$KEY" >> $GITHUB_ENV
      
          echo "Final bucket: $BUCKET"
          echo "Final key: $KEY"

      # 7️⃣ Trigger CodeDeploy
      - name: Trigger CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name simple-web-app \
            --deployment-group-name ec2-test-deployment-group \
            --deployment-config-name CodeDeployDefault.OneAtATime \
            --s3-location bucket=$BUCKET,key=$KEY,bundleType=zip
